 <!DOCTYPE html>
<html>
<head>
    <title>Login - FinTrackpro</title>
    <style>
        body { background: #fdfdfd; height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Arial', sans-serif; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 350px; border: 1px solid #fce4ec; }
        h2 { color: #d81b60; text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #f06292; }

        .btn-login { width: 100%; padding: 12px; background: #f06292; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-login:hover { background: #d81b60; }


        .divider { margin: 20px 0; text-align: center; font-size: 12px; color: #bbb; position: relative; }
        .divider:after { content: ""; height: 1px; width: 100%; background: #eee; position: absolute; left: 0; top: 50%; z-index: 1; }
        .divider span { background: white; padding: 0 10px; position: relative; z-index: 2; }

        .btn-reg { display: block; text-align: center; margin-top: 10px; color: #1976d2; text-decoration: none; font-size: 14px; background: #e3f2fd; padding: 12px; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-reg:hover { background: #1976d2; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" placeholder="Email or Phone Number" required>
            <input type="password" maxlength="4" placeholder="4-Digit PIN" style="text-align:center" required>
            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="divider"><span>IF NOT REGISTERED?</span></div>

        <a href="{% url 'register' %}" class="btn-reg">Create New ID / Register</a>
    </div> </body>
</html>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <div class="card p-4 shadow mx-auto" style="max-width: 500px;">
        <h3>{{ title }}</h3>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label>Circle Name</label>
                <input type="text" name="name" class="form-control" value="{{ circle.name }}" required>
            </div>
            <div class="mb-3">
                <label>Description</label>
                <textarea name="desc" class="form-control" required>{{ circle.description }}</textarea>
            </div>
            <div class="mb-3">
                <label>Cover Image</label>
                <input type="file" name="image" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Save Circle</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>

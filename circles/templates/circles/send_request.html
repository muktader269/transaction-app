<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Send Request | Trusted Circle</title>
    <style>
        body { background-color: #f8f9fa; }
        .request-card {
            max-width: 450px;
            margin: 80px auto;
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            border-radius: 20px 20px 0 0 !important;
            padding: 20px;
            text-align: center;
        }
        .btn-send {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-send:hover {
            background-color: #0b5ed7;
            transform: translateY(-2px);
        }
        .circle-badge {
            background-color: #e7f1ff;
            color: #0d6efd;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card request-card">
            <div class="card-header">
                <i class="fa-solid fa-paper-plane fa-2x mb-2"></i>
                <h4 class="mb-0">Send Trusted Request</h4>
            </div>
            <div class="card-body p-4">
                <p class="text-center text-muted mb-4">
                    Invite someone to join your circle: <br>
                    <span class="circle-badge mt-2 d-inline-block">{{ circle.name }}</span>
                </p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold">Receiver's Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="fa-solid fa-envelope text-muted"></i>
                            </span>
                            <input type="email"
                                   name="email"
                                   id="email"
                                   class="form-control border-start-0 ps-0"
                                   placeholder="example@mail.com"
                                   required>
                        </div>
                        <div class="form-text mt-2">
                            We'll send an invitation to this email to join your circle.
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-send">
                            Send Invitation
                        </button>
                        <a href="{% url 'circle_list' %}" class="btn btn-link text-decoration-none text-muted mt-2">
                            <i class="fa-solid fa-arrow-left me-1"></i> Back to Dashboard
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
